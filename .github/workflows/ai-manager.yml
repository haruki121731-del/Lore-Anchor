name: AI Auto Developer

on:
  issues:
    types: [opened, reopened, labeled]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  auto-code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install openai>=1.0.0 PyGithub>=2.0.0

      - name: Create Branch
        env:
          ISSUE_NUM: ${{ github.event.issue.number || 'manual' }}
        run: |
          git config --global user.name "AI-Auto-Dev"
          git config --global user.email "actions@github.com"
          BRANCH_NAME="feature/issue-${ISSUE_NUM}-auto-dev-$(date +%s)"
          git checkout -b $BRANCH_NAME
          echo "HEAD_BRANCH=$BRANCH_NAME" >> $GITHUB_ENV

      - name: Run AI Agent
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number || '0' }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python -u .github/scripts/ai_coder.py
        continue-on-error: false

      - name: Check for changes
        id: git-check
        run: |
          git add .
          if git diff --staged --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          else
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected"
          fi

      - name: Commit and Push
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git commit -m "🤖 AI Auto-fix for Issue #${{ github.event.issue.number || 'manual' }}"
          git push origin ${{ env.HEAD_BRANCH }}

      - name: Create Pull Request
        if: steps.git-check.outputs.changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create --title "🤖 AI Fix for Issue #${{ github.event.issue.number || 'manual' }}" \
                       --body "AIによる自動修正" \
                       --head ${{ env.HEAD_BRANCH }} \
                       --base main || echo "PR may already exist"
