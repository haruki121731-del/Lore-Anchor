name: AI Auto Developer

on:
  issues:
    types: [opened, reopened, labeled]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  auto-code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install openai>=1.0.0 PyGithub>=2.0.0

      - name: Create Branch
        id: create-branch
        env:
          ISSUE_NUM: ${{ github.event.issue.number || 'manual' }}
        run: |
          git config --global user.name "AI-Auto-Dev"
          git config --global user.email "actions@github.com"
          BRANCH_NAME="feature/issue-${ISSUE_NUM}-auto-dev-$(date +%s)"
          git checkout -b $BRANCH_NAME
          echo "HEAD_BRANCH=$BRANCH_NAME" >> $GITHUB_ENV
          echo "branch=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "Created branch: $BRANCH_NAME"

      - name: Run AI Agent
        id: ai-agent
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number || '0' }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PYTHONUNBUFFERED: "1"
        run: |
          python -u .github/scripts/ai_coder.py 2>&1 | tee ai_agent_output.log
          exit_code=${PIPESTATUS[0]}
          echo "AI_AGENT_EXIT_CODE=$exit_code" >> $GITHUB_ENV
          exit $exit_code

      - name: Upload AI Agent Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ai-agent-logs
          path: ai_agent_output.log
          retention-days: 1

      - name: Check for changes
        id: git-check
        if: success()
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No changes detected by AI"
          else
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "✅ Changes detected"
            git diff --staged --stat
          fi

      - name: Commit and Push
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git commit -m "🤖 AI Auto-fix for Issue #${{ github.event.issue.number || 'manual' }}"
          git push origin ${{ env.HEAD_BRANCH }}
          echo "✅ Committed and pushed to ${{ env.HEAD_BRANCH }}"

      - name: Create Pull Request
        if: steps.git-check.outputs.changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "🤖 AI Fix for Issue #${{ github.event.issue.number || 'manual' }}" \
            --body "This PR was automatically generated by AI Auto Developer." \
            --head ${{ env.HEAD_BRANCH }} \
            --base main || echo "⚠️ PR creation skipped (may already exist)"
